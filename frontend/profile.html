<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | TalentBridge</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #0f1117; --slate: #3d4451; --mist: #8891a4; --line: #e8eaed;
            --surface: #f7f8fa; --white: #ffffff; --teal: #0ea5a0; --teal-dk: #0c8f8a;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--surface); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); width: 100%; max-width: 520px; padding: 40px 48px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--mist); font-size: 13px; text-decoration: none; margin-bottom: 28px; transition: color 0.2s; }
        .back-link:hover { color: var(--teal); }
        h2 { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); margin-bottom: 6px; }
        .sub { font-size: 14px; color: var(--mist); margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--slate); margin-bottom: 8px; }
        input[type="text"], textarea {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--line); border-radius: 8px;
            font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--ink); background: white;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--teal); }
        textarea { resize: vertical; min-height: 90px; }
        .hint { font-size: 12px; color: var(--mist); margin-top: 5px; }
        .file-area {
            border: 2px dashed var(--line); border-radius: 8px; padding: 20px;
            text-align: center; cursor: pointer; transition: border-color 0.2s; position: relative;
        }
        .file-area:hover { border-color: var(--teal); }
        .file-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .file-area .file-icon { font-size: 24px; margin-bottom: 6px; }
        .file-area .file-text { font-size: 13px; color: var(--mist); }
        .file-area .file-text strong { color: var(--teal); }
        .current-resume { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f0fafa; border-radius: 8px; margin-bottom: 10px; font-size: 13px; color: var(--slate); }
        .btn-primary {
            width: 100%; padding: 14px; background: var(--teal); color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s; margin-top: 8px;
        }
        .btn-primary:hover { background: var(--teal-dk); }
        #file-name-display { margin-top: 6px; font-size: 12px; color: var(--teal); display: none; }
    </style>
</head>
<body>
    <div class="card">
        <a href="/" class="back-link">← Back to dashboard</a>
        <h2>My Profile</h2>
        <p class="sub">Keep your skills updated to get better job matches.</p>

        <form action="/profile" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Your Skills</label>
                <input type="text" name="skills" value="{{ current_user.skills or '' }}" placeholder="Python, React, SQL, Machine Learning...">
                <div class="hint">Comma-separated. These are matched against job requirements.</div>
            </div>
            <div class="form-group">
                <label>Bio / Summary</label>
                <textarea name="bio" placeholder="A brief intro about your experience and goals...">{{ current_user.bio or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Resume (PDF or DOCX)</label>
                {% if current_user.resume_path %}
                <div class="current-resume">
                    📄 Resume on file &nbsp;·&nbsp; <a href="/static/{{ current_user.resume_path }}" target="_blank" style="color:var(--teal);">View</a>
                </div>
                {% endif %}
                <div class="file-area" onclick="">
                    <div class="file-icon">📁</div>
                    <div class="file-text"><strong>Click to upload</strong> or drag and drop</div>
                    <input type="file" name="resume" accept=".pdf,.doc,.docx" onchange="document.getElementById('file-name-display').style.display='block'; document.getElementById('file-name-display').textContent=this.files[0].name;">
                </div>
                <div id="file-name-display"></div>
            </div>
            <button type="submit" class="btn-primary">Save Profile</button>
        </form>
    </div>
</body>
</html>
